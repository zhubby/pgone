[package]
name = "pgone-gui"
version = { workspace = true }
edition = { workspace = true }
description = { workspace = true }
repository = { workspace = true }
license = { workspace = true }
homepage = { workspace = true }
documentation = { workspace = true }
keywords = { workspace = true }
categories = { workspace = true }

[[bin]]
name = "pgone-gui"
path = "src/main.rs"

[dependencies]
emath = { version = "0.32.3", default-features = false }
ecolor = { version = "0.32.3", default-features = false }
epaint = { version = "0.32.3", default-features = false }
epaint_default_fonts = { version = "0.32.3" }
egui_table = "0.4.0"
egui-phosphor = "0.10"
egui-notify = "0.20"
egui = { version = "0.32.3", default-features = false }
eframe = { version = "0.32.3" }
egui_extras = { version = "0.32.3" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
image = "0.25"
webbrowser = "1"
rfd = "0.15"
open = "5"
pulldown-cmark = "0.12"
sqlparser = "0.48"
tokio = { workspace = true }
sqlx = { workspace = true }
hex = "0.4"
csv = "1"
async-openai = "0.25"
pgone-storage = { workspace = true }
urlencoding = "2"
url = "2.5"
icns = "0.3.1"
anyhow = { workspace = true }
strum = { workspace = true }
reqwest = { workspace = true }
tracing-subscriber = { workspace = true }

pgone-apiserver = { workspace = true }
pgone-mcp-server = { workspace = true }
pgone-a2a = { workspace = true }

